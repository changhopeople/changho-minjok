<svg width="400" height="560" viewBox="0 0 400 560" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="0" y2="560" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4A7C59"/>
      <stop offset="100%" stop-color="#3A6347"/>
    </linearGradient>
  </defs>
  <rect width="400" height="560" rx="16" fill="url(#bg1)"/>

  <!-- Logo area -->
  <rect x="20" y="20" width="32" height="32" rx="4" fill="white" opacity="0.2"/>
  <rect x="24" y="24" width="10" height="24" rx="2" fill="white" opacity="0.6"/>
  <rect x="38" y="24" width="10" height="24" rx="2" fill="white" opacity="0.6"/>
  <text x="62" y="42" font-family="Arial, sans-serif" font-size="14" font-weight="800" fill="white">창호의민족</text>

  <!-- Main Title -->
  <text x="200" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="900" fill="#FFD700" letter-spacing="-1">그린리모델링</text>
  <text x="200" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="900" fill="white" letter-spacing="-1">사업 안내(민간)</text>

  <!-- Sub description -->
  <text x="200" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="white" opacity="0.8">민간건축물의 그린리모델링 공사비를</text>
  <text x="200" y="183" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="white" opacity="0.8">금융기관에서 대출할 경우 공사비와 이자 일부를 보조</text>

  <!-- Support amount cards -->
  <rect x="20" y="205" width="175" height="100" rx="14" fill="white" opacity="0.15"/>
  <rect x="20" y="205" width="175" height="36" rx="14" fill="white" opacity="0.1"/>
  <rect x="20" y="227" width="175" height="14" fill="white" opacity="0.1"/>
  <text x="107" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="white">🏠 단독주택</text>
  <text x="107" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="900" fill="#FFD700">최대 1억</text>
  <text x="107" y="293" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white" opacity="0.8">원까지 지원</text>

  <rect x="205" y="205" width="175" height="100" rx="14" fill="white" opacity="0.15"/>
  <rect x="205" y="205" width="175" height="36" rx="14" fill="white" opacity="0.1"/>
  <rect x="205" y="227" width="175" height="14" fill="white" opacity="0.1"/>
  <text x="292" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="white">🏢 공동주택</text>
  <text x="292" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="900" fill="#FFD700">최대 3천만</text>
  <text x="292" y="293" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white" opacity="0.8">원까지 지원</text>

  <!-- 60 months -->
  <rect x="20" y="320" width="360" height="50" rx="12" fill="#FF6F0F"/>
  <text x="200" y="351" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="800" fill="white">최대 60개월(5년) 할부 가능!</text>

  <!-- Construction items -->
  <text x="200" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="white">공사 항목</text>
  <g transform="translate(20, 415)">
    <rect x="0" y="0" width="85" height="56" rx="8" fill="white" opacity="0.15"/>
    <text x="42" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="14">🪟</text>
    <text x="42" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#FFD700">고성능 창호</text>
    <rect x="30" y="48" width="24" height="10" rx="5" fill="#FF6F0F"/>
    <text x="42" y="56" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" font-weight="700" fill="white">추천</text>

    <rect x="92" y="0" width="85" height="56" rx="8" fill="white" opacity="0.15"/>
    <text x="134" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="14">🏗️</text>
    <text x="134" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="white">단열보강</text>

    <rect x="184" y="0" width="85" height="56" rx="8" fill="white" opacity="0.15"/>
    <text x="226" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="14">❄️</text>
    <text x="226" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="white">냉난방장치</text>

    <rect x="276" y="0" width="85" height="56" rx="8" fill="white" opacity="0.15"/>
    <text x="318" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="14">💡</text>
    <text x="318" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="white">LED 조명</text>
  </g>

  <text x="200" y="498" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white" opacity="0.7">공사 항목 중 한 가지 이상을 필수 적용</text>

  <!-- CTA -->
  <rect x="60" y="512" width="280" height="30" rx="15" fill="white"/>
  <text x="200" y="532" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="800" fill="#4A7C59">무료 상담 신청하기 →</text>
</svg>