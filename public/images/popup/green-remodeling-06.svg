<svg width="400" height="560" viewBox="0 0 400 560" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg6" x1="0" y1="0" x2="400" y2="560" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF6F0F"/>
      <stop offset="100%" stop-color="#E5630D"/>
    </linearGradient>
  </defs>
  <rect width="400" height="560" rx="16" fill="url(#bg6)"/>

  <!-- Decorative -->
  <circle cx="340" cy="70" r="80" fill="white" opacity="0.06"/>
  <circle cx="60" cy="500" r="60" fill="white" opacity="0.06"/>

  <!-- Logo -->
  <text x="200" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="white" opacity="0.8">창호의민족 × 그린리모델링</text>

  <!-- Big question -->
  <text x="200" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="900" fill="white" letter-spacing="-1">창호 교체</text>
  <text x="200" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="900" fill="white" letter-spacing="-1">비용이 부담되시나요?</text>

  <!-- White card -->
  <rect x="25" y="150" width="350" height="340" rx="20" fill="white"/>

  <!-- Inside card -->
  <text x="200" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#1E1E1E">정부 지원으로 부담을 확 줄이세요!</text>

  <!-- Amount highlight -->
  <rect x="45" y="200" width="310" height="90" rx="14" fill="#FFF7ED"/>
  <text x="200" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FF6F0F" font-weight="600">지원 한도</text>
  <text x="120" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#999">단독주택</text>
  <text x="120" y="283" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="900" fill="#FF6F0F">최대 1억</text>
  <rect x="195" y="250" width="1" height="30" fill="#E0E0E0"/>
  <text x="280" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#999">공동주택</text>
  <text x="280" y="283" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="900" fill="#FF6F0F">최대 3천만</text>

  <!-- 60 months -->
  <rect x="45" y="302" width="310" height="52" rx="14" fill="#4A7C59" opacity="0.08"/>
  <text x="72" y="325" font-family="Arial, sans-serif" font-size="22">📅</text>
  <text x="100" y="322" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#4A7C59">최대 60개월(5년) 할부</text>
  <text x="100" y="342" font-family="Arial, sans-serif" font-size="11" fill="#4A7C59">정부 이자 지원으로 낮은 금리 혜택</text>

  <!-- Benefits -->
  <g transform="translate(45, 366)">
    <text x="0" y="15" font-family="Arial, sans-serif" font-size="12" fill="#FF6F0F" font-weight="700">✓</text>
    <text x="18" y="15" font-family="Arial, sans-serif" font-size="12" fill="#666">고성능 창호 교체 → 난방비 최대 40% 절감</text>
    <text x="0" y="38" font-family="Arial, sans-serif" font-size="12" fill="#FF6F0F" font-weight="700">✓</text>
    <text x="18" y="38" font-family="Arial, sans-serif" font-size="12" fill="#666">결로·곰팡이·외풍 완벽 해결</text>
    <text x="0" y="61" font-family="Arial, sans-serif" font-size="12" fill="#FF6F0F" font-weight="700">✓</text>
    <text x="18" y="61" font-family="Arial, sans-serif" font-size="12" fill="#666">복잡한 서류 준비 → 창호의민족이 대행</text>
  </g>

  <!-- CTA inside card -->
  <rect x="55" y="448" width="290" height="28" rx="14" fill="#FF6F0F"/>
  <text x="200" y="467" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="800" fill="white">무료 상담 신청 →</text>

  <!-- Bottom -->
  <text x="200" y="520" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="white">지금 상담하면</text>
  <text x="200" y="545" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="white">지원금 신청까지 무료로 도와드립니다</text>
</svg>